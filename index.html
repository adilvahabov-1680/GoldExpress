<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>GoldExpress — Kargo İdarəetmə v11</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0a0a12;
  --ink2:#0f0f1a;
  --ink3:#161622;
  --ink4:#1e1e2e;
  --gold:#f0a500;
  --gold2:#d49000;
  --glow:rgba(240,165,0,0.12);
  --red:#e63946;
  --green:#22c55e;
  --blue:#3b82f6;
  --purple:#a78bfa;
  --whatsapp:#25D366;
  --text:#f0f0f8;
  --t2:#a0a0b8;
  --t3:#6a6a88;
  --bdr:rgba(255,255,255,0.06);
  --card:rgba(255,255,255,0.03);
  --sb:260px;
  --radius:14px;
}
html{font-size:14px}
body{font-family:'Plus Jakarta Sans','Inter',system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--ink);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

/* PUBLIC TRACKING PAGE STYLES */
.tracking-page{min-height:100vh;background:linear-gradient(135deg,#0a0a12 0%,#161622 100%);padding:20px}
.tracking-container{max-width:500px;margin:0 auto}
.tracking-header{text-align:center;margin-bottom:30px;padding:20px 0}
.tracking-logo{font-size:3.5rem;margin-bottom:10px}
.tracking-header h1{font-size:1.5rem;font-weight:800;background:linear-gradient(120deg,var(--gold),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tracking-header p{color:var(--t3);font-size:.75rem;margin-top:5px}
.tracking-card{background:var(--ink3);border:1px solid var(--bdr);border-radius:20px;padding:24px;margin-bottom:16px}
.tracking-id{text-align:center;margin-bottom:20px}
.tracking-id .label{color:var(--t3);font-size:.7rem;text-transform:uppercase;letter-spacing:1px}
.tracking-id .value{font-family:'IBM Plex Mono',monospace;font-size:1.2rem;font-weight:700;color:var(--gold);margin-top:5px}
.tracking-status{text-align:center;margin:20px 0}
.status-badge{display:inline-block;padding:8px 20px;border-radius:30px;font-size:.85rem;font-weight:700}
.status-badge.s1{background:rgba(80,80,106,.3);color:#a0a0b8}
.status-badge.s2{background:rgba(240,165,0,.15);color:var(--gold)}
.status-badge.s3{background:rgba(59,130,246,.15);color:var(--blue)}
.status-badge.s4{background:rgba(167,139,250,.15);color:var(--purple)}
.status-badge.s5{background:rgba(6,182,212,.15);color:var(--cyan)}
.status-badge.s6{background:rgba(34,197,94,.15);color:var(--green)}
.status-badge.s7{background:rgba(34,197,94,.25);color:#4ade80}
.tracking-progress{margin:24px 0}
.progress-step{display:flex;align-items:center;margin-bottom:12px}
.step-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;border:2px solid var(--bdr);background:var(--ink2);flex-shrink:0}
.step-done{background:var(--green);border-color:var(--green);color:#fff}
.step-current{background:var(--gold);border-color:var(--gold);color:#000}
.step-pending{background:var(--ink4);border-color:var(--bdr);color:var(--t3)}
.step-content{margin-left:14px;flex:1}
.step-title{font-weight:700;color:#fff;font-size:.85rem}
.step-date{font-size:.65rem;color:var(--t3);margin-top:2px}
.step-line{width:2px;height:20px;margin-left:17px;background:var(--bdr)}
.step-line.done{background:var(--green)}
.tracking-info{margin-top:20px}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr)}
.info-label{color:var(--t3);font-size:.78rem}
.info-value{color:#fff;font-weight:500;font-size:.78rem;text-align:right}
.tracking-footer{text-align:center;margin-top:24px;padding:16px;color:var(--t3);font-size:.7rem}
.tracking-error{text-align:center;padding:40px 20px}
.tracking-error i{font-size:3rem;color:var(--red);margin-bottom:15px}
.tracking-error h3{color:#fff;margin-bottom:10px}
.tracking-error p{color:var(--t3)}

/* LOGIN STYLES */
.login-wrap{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 30% 40%,rgba(240,165,0,.05) 0%,transparent 70%),var(--ink)}
.login-box{background:var(--ink3);border:1px solid var(--bdr);border-radius:28px;padding:40px 32px;width:100%;max-width:400px;text-align:center}
.login-box .logo{font-size:3rem;margin-bottom:10px}
.login-box h1{font-size:1.6rem;font-weight:900;background:linear-gradient(120deg,var(--gold),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.input-group{position:relative;margin-bottom:14px}
.input-group i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--t3)}
.input-group input{width:100%;padding:12px 40px 12px 42px;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:12px;color:var(--text);font-size:.9rem;outline:none}
.input-group input:focus{border-color:var(--gold)}
.input-group .toggle-pwd{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:12px;color:#000;font-size:.95rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.login-btn:hover{transform:translateY(-2px)}
.login-hint{margin-top:16px;font-size:.65rem;color:var(--t3);background:rgba(255,255,255,.03);padding:10px;border-radius:10px}

/* APP STYLES */
.app{display:none;min-height:100vh}
.sb{position:fixed;left:0;top:0;width:var(--sb);height:100vh;background:rgba(15,15,26,.85);backdrop-filter:blur(20px);border-right:1px solid var(--bdr);display:flex;flex-direction:column;z-index:200}
.sb-logo{display:flex;align-items:center;gap:12px;padding:24px 20px 20px;border-bottom:1px solid var(--bdr)}
.sb-logo .ico{font-size:1.8rem}
.sb-logo-txt h3{color:var(--gold);font-size:1rem;font-weight:800}
.sb-nav{flex:1;overflow-y:auto;padding:12px}
.nv{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;color:var(--t2);font-size:.85rem;font-weight:600;border:none;background:none;width:100%;text-align:left}
.nv:hover{background:var(--card);color:var(--text)}
.nv.act{background:var(--glow);color:var(--gold)}
.nv i{width:20px}
.sb-bottom{padding:12px;border-top:1px solid var(--bdr)}
.sb-user{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border-radius:14px;margin-bottom:10px}
.sb-avt{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--red));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
.sb-uinfo h4{color:var(--text);font-size:.85rem}
.qr-scan-btn,.logout-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:12px;font-size:.85rem;font-weight:700;cursor:pointer}
.qr-scan-btn{background:var(--glow);border:1px solid rgba(240,165,0,.25);color:var(--gold);margin-bottom:8px}
.logout-btn{background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.25);color:var(--red)}
.main{margin-left:var(--sb);min-height:100vh}
.page{padding:28px 32px;max-width:1400px}
.phdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:15px}
.phdr h2{font-size:1.3rem;font-weight:800;color:#fff;display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:none;border-radius:12px;font-size:.8rem;font-weight:700;cursor:pointer}
.btn-wa{background:#25D366;color:#fff}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
.btn-green{background:linear-gradient(135deg,var(--green),#15803d);color:#fff}
.btn-blue{background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff}
.btn-ghost{background:var(--card);border:1px solid var(--bdr);color:var(--t2)}
.btn-sm{padding:7px 16px;font-size:.75rem}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px}
.sc{background:var(--ink3);border:1px solid var(--bdr);border-radius:14px;padding:20px;cursor:pointer}
.sc:hover{transform:translateY(-4px);border-color:rgba(240,165,0,.2)}
.sc .sic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:12px}
.sc.c1 .sic{background:rgba(230,57,70,.15);color:var(--red)}
.sc.c2 .sic{background:rgba(240,165,0,.15);color:var(--gold)}
.sc.c3 .sic{background:rgba(59,130,246,.15);color:var(--blue)}
.sc.c4 .sic{background:rgba(34,197,94,.15);color:var(--green)}
.sc.c5 .sic{background:rgba(167,139,250,.15);color:var(--purple)}
.sc h3{font-size:1.8rem;font-weight:800;color:#fff}
.sc p{color:var(--t3);font-size:.7rem}
.tw{background:var(--ink3);border:1px solid var(--bdr);border-radius:14px;overflow-x:auto}
.th{display:grid;grid-template-columns:110px 150px 80px 140px 130px 110px 100px 110px;padding:12px 18px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--bdr);color:var(--t3);font-size:.62rem;font-weight:700;gap:8px}
.tr{display:grid;grid-template-columns:110px 150px 80px 140px 130px 110px 100px 110px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.03);align-items:center;gap:8px;font-size:.8rem}
.tr:hover{background:rgba(255,255,255,.02)}
.tid{font-family:'IBM Plex Mono',monospace;color:var(--gold);font-weight:700;cursor:pointer}
.stb{padding:5px 10px;border-radius:20px;font-size:.6rem;font-weight:700;display:inline-block}
.s1{background:rgba(80,80,106,.3);color:#a0a0b8}
.s2{background:rgba(240,165,0,.15);color:var(--gold)}
.s3{background:rgba(59,130,246,.15);color:var(--blue)}
.s4{background:rgba(167,139,250,.15);color:var(--purple)}
.s5{background:rgba(6,182,212,.15);color:var(--cyan)}
.s6{background:rgba(34,197,94,.15);color:var(--green)}
.s7{background:rgba(34,197,94,.25);color:#4ade80}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.action-btn{width:30px;height:30px;border-radius:9px;border:none;cursor:pointer}
.action-view{background:rgba(59,130,246,.15);color:var(--blue)}
.action-qr{background:rgba(240,165,0,.15);color:var(--gold)}
.action-edit{background:rgba(240,165,0,.15);color:var(--gold)}
.action-wa{background:rgba(37,211,102,.15);color:#25D366}
.action-print{background:rgba(167,139,250,.15);color:var(--purple)}
.action-delete{background:rgba(230,57,70,.15);color:var(--red)}
.empty-state{text-align:center;padding:60px 20px;color:var(--t3)}

/* MODALS */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);z-index:1000;align-items:center;justify-content:center;padding:16px}
.ov.on{display:flex}
.modal{background:var(--ink2);border:1px solid var(--bdr);border-radius:24px;padding:28px;max-width:720px;width:100%;max-height:90vh;overflow-y:auto}
.modal.wide{max-width:880px}
.modal.narrow{max-width:480px}
.modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.06);border:none;color:var(--t3);width:32px;height:32px;border-radius:10px;cursor:pointer}
.modal-header{font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:20px}
.section-title{font-size:.65rem;color:var(--gold);margin:18px 0 12px;padding-bottom:6px;border-bottom:1px solid rgba(240,165,0,.15);font-weight:700}
.form-group{margin-bottom:14px}
.form-group label{color:var(--t2);font-size:.73rem;display:block;margin-bottom:5px}
.form-input{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:11px;color:var(--text);font-size:.85rem;outline:none}
.form-input:focus{border-color:var(--gold)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.save-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:12px;color:#000;font-size:.9rem;font-weight:800;cursor:pointer;margin-top:16px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.detail-card{background:rgba(255,255,255,.04);padding:13px;border-radius:11px;border:1px solid var(--bdr)}
.detail-card label{color:var(--t3);font-size:.6rem;display:block;margin-bottom:3px}
.detail-card span{color:#fff;font-size:.85rem;font-weight:600}
.detail-card.full{grid-column:1/-1}
.status-buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.status-btn{padding:11px;border:none;border-radius:11px;font-size:.78rem;font-weight:700;cursor:pointer;min-width:120px}
.status-next{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.status-prev{background:rgba(230,57,70,.12);color:var(--red);border:1px solid rgba(230,57,70,.25)}
.progress-track{display:flex;align-items:center;margin:16px 0;overflow-x:auto}
.progress-step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:65px}
.progress-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;border:2px solid var(--bdr);background:var(--ink2)}
.progress-done{background:var(--green);border-color:var(--green);color:#fff}
.progress-current{background:var(--gold);border-color:var(--gold);color:#000}
.progress-label{font-size:.6rem;color:var(--t3);text-align:center}
.progress-line{flex:1;height:2px;background:var(--bdr);margin-bottom:22px}
.progress-line.done{background:var(--green)}
.history-item{background:var(--ink3);border:1px solid var(--bdr);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.history-text strong{color:#fff;font-size:.82rem}
.history-time{color:var(--t3);font-size:.68rem;white-space:nowrap;margin-left:auto}
.finance-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.finance-card{background:var(--ink3);border:1px solid var(--bdr);border-radius:14px;padding:22px;text-align:center}
.employee-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.emp-card{background:var(--ink3);border:1px solid var(--bdr);border-radius:14px;padding:20px}
.emp-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--red));display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;color:#fff}
.role-badge{padding:3px 10px;border-radius:20px;font-size:.6rem;font-weight:700}
.role-admin{background:rgba(230,57,70,.15);color:var(--red)}
.role-operator{background:rgba(167,139,250,.15);color:var(--purple)}
.role-warehouse{background:rgba(240,165,0,.15);color:var(--gold)}
.role-courier{background:rgba(59,130,246,.15);color:var(--blue)}
.profile-card{background:var(--ink3);border-radius:14px;padding:28px}
.profile-header{display:flex;align-items:center;gap:20px}
.profile-avatar{width:75px;height:75px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--red));display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff}
@keyframes notifyIn{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}
.notify-area{position:fixed;top:16px;right:16px;z-index:9990;display:flex;flex-direction:column;gap:8px;max-width:340px}
.notify{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;background:rgba(22,22,34,.98);border-left:3px solid;animation:notifyIn .28s ease}
.notify.s{border-left-color:var(--green)}.notify.e{border-left-color:var(--red)}
.sync-pill{position:fixed;bottom:20px;right:20px;padding:8px 16px;border-radius:40px;font-size:.7rem;background:var(--ink3);border:1px solid var(--bdr);opacity:0}
.sync-pill.show{opacity:1}
.sync-pill.ok{background:rgba(34,197,94,.9);color:#fff}

@media(max-width:850px){
  :root{--sb:70px}
  .sb-logo-txt,.nv span,.sb-uinfo,.sb-sec{display:none}
  .nv{justify-content:center;padding:12px}
  .page{padding:16px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .form-row,.form-row3{grid-template-columns:1fr}
  .th,.tr{min-width:800px}
}

/* === FIX: SELECT OPTION DARK BACKGROUND === */
select.form-input{appearance:none;-webkit-appearance:none;-moz-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%23a0a0b8' d='M6 8L0 0h12z'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:36px}
select.form-input option,select option{background:var(--ink3)!important;color:var(--text)!important;padding:8px}
select.form-input optgroup{background:var(--ink2);color:var(--gold)}

/* === MISSING CLASSES === */
.sectionTitle,.section-title{font-size:.65rem;color:var(--gold);margin:18px 0 12px;padding-bottom:6px;border-bottom:1px solid rgba(240,165,0,.15);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.search-bar{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.search-box{position:relative;flex:1;min-width:200px}
.search-box i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:.85rem;pointer-events:none}
.search-box input{width:100%;padding:11px 14px 11px 40px;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:11px;color:var(--text);font-size:.85rem;outline:none;font-family:inherit}
.search-box input:focus{border-color:var(--gold)}
.phdr-acts{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn-purple{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff}
.btn-red{background:linear-gradient(135deg,var(--red),#b91c1c);color:#fff}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.25)}
.btn:active{transform:translateY(0)}
.emp-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.emp-info{flex:1;min-width:0}
.emp-info h4{color:#fff;font-size:.95rem;margin-bottom:4px}
.emp-details{color:var(--t2);font-size:.78rem;line-height:1.7}
.emp-details p{display:flex;align-items:center;gap:8px;word-break:break-all}
.emp-details i{color:var(--t3);width:14px}
.emp-card .actions{margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)}
.profile-info{flex:1}
.profile-info h3{color:#fff;font-size:1.2rem;margin-bottom:4px}
.profile-info span{color:var(--gold);font-size:.85rem;font-weight:600}
.profile-card .emp-details{margin-top:20px;padding-top:20px;border-top:1px solid var(--bdr)}
.mono,.tid{font-family:'IBM Plex Mono','Courier New',monospace}
.detail-card.gold{background:rgba(240,165,0,.08);border-color:rgba(240,165,0,.25)}
.detail-card.gold label{color:var(--gold)}
.sb-sec{padding:8px 14px;color:var(--t3);font-size:.6rem;text-transform:uppercase;letter-spacing:1px;margin-top:8px}
.notify.s{border-left-color:var(--green)}
.notify.e{border-left-color:var(--red)}
.notify.i{border-left-color:var(--blue)}
.notify.w{border-left-color:var(--gold)}
.notify i{font-size:1.1rem}
.notify.s i{color:var(--green)}
.notify.e i{color:var(--red)}
.notify.i i{color:var(--blue)}
.notify.w i{color:var(--gold)}
.sync-pill{transition:opacity .25s}
.sync-pill i{margin-right:6px}

/* Loading overlay */
.loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ink);z-index:9999;transition:opacity .35s}
.loading.out{opacity:0;pointer-events:none}
.loading-icon{font-size:3.5rem;animation:bounce 1s infinite}

*:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}

/* Better contrast for muted text */

/* Modal animation */

.ov.on .modal{animation:modalIn .22s cubic-bezier(.4,0,.2,1)}

.tr{transition:background .15s}

::-webkit-scrollbar-track{background:var(--ink2)}

function formatPhoneNumber(phone) {
  if (!phone || phone === '—' || phone === 'unknown') return null;
  let cleaned = String(phone).replace(/[^0-9+]/g, '');
  if (!cleaned) return null;
  // Минимум 9 цифр для валидного номера
  const digits = cleaned.replace(/\D/g, '');
  if (digits.length < 9) return null;
  if (cleaned.startsWith('+')) return cleaned;
  if (cleaned.startsWith('994')) return '+' + cleaned;
  if (cleaned.startsWith('0')) return '+994' + cleaned.substring(1);
  return '+994' + cleaned;
}

// PUBLIC TRACKING PAGE
async function renderPublicTracking() {
  const urlParams = new URLSearchParams(window.location.search);
  const trackId = urlParams.get('track');
  
  if (!trackId) {
    document.getElementById('appRoot').innerHTML = `
      <div class="tracking-page">
        <div class="tracking-container">
          <div class="tracking-header">
            <div class="tracking-logo">📦</div>
            <h1>GoldExpress</h1>

          </div>
          <div class="tracking-error">
            <i class="fas fa-search"></i>
            <h3>Bağlama ID tapılmadı</h3>
            <p>Zəhmət olmasa keçid linkini yoxlayın</p>
          </div>
        </div>
      </div>
    `;
    return;
  }

  const shipDoc = await getDoc(doc(db, 'shipments', trackId));
  if (!shipDoc.exists()) {
    document.getElementById('appRoot').innerHTML = `
      <div class="tracking-page">
        <div class="tracking-container">
          <div class="tracking-header">
            <div class="tracking-logo">📦</div>
            <h1>GoldExpress</h1>
            <p>Bağlama İzləmə Sistemi</p>
          </div>
          <div class="tracking-error">
            <i class="fas fa-box-open"></i>
            <h3>Bağlama tapılmadı</h3>
            <p>"${esc(trackId)}" ID-li bağlama sistemdə mövcud deyil</p>
          </div>
        </div>
      </div>
    `;
    return;
  }

  const s = shipDoc.data();
  const statuses = s.shipType === 'domestic' ? DOMESTIC_STATUSES : INTERNATIONAL_STATUSES;
  const currentIdx = statuses.indexOf(s.status);
  
  let stepsHtml = '';
  for (let i = 0; i < statuses.length; i++) {
    let stepClass = 'step-pending';
    if (i < currentIdx) stepClass = 'step-done';
    else if (i === currentIdx) stepClass = 'step-current';
    
    let icon = '';
    if (i < currentIdx) icon = '<i class="fas fa-check"></i>';
    else if (i === currentIdx) icon = '<i class="fas fa-box"></i>';
    else icon = '<i class="far fa-circle"></i>';
    
    stepsHtml += `
      <div class="progress-step">
        <div class="step-dot ${stepClass}">${icon}</div>
        <div class="step-content">
          <div class="step-title">${STATUS_LABELS[statuses[i]]}</div>
          ${i === currentIdx ? '<div class="step-date">✓ Hazırda bu mərhələdə</div>' : ''}
        </div>
      </div>
    `;
    if (i < statuses.length - 1) {
      stepsHtml += `<div class="step-line ${i < currentIdx ? 'done' : ''}"></div>`;
    }
  }

  document.getElementById('appRoot').innerHTML = `
    <div class="tracking-page">
      <div class="tracking-container">
        <div class="tracking-header">
          <div class="tracking-logo">📦</div>
          <h1>GoldExpress Kargo</h1>
          <p>Bağlamanızın cari vəziyyəti</p>

            <div class="label">Bağlama ID</div>
            <div class="value">${esc(s.id)}</div>
          </div>
          <div class="tracking-status">
            <span class="status-badge ${STATUS_CLASS[s.status]||'s1'}">${esc(STATUS_LABELS[s.status]||s.status)}</span>
          </div>
          <div class="tracking-progress">
            ${stepsHtml}
          </div>
        </div>
        <div class="tracking-card">
          <div class="tracking-info">
            <div class="info-row"><span class="info-label">Göndərən</span><span class="info-value">${esc((s.senderName || '') + ' ' + (s.senderSurname || ''))}</span></div>
            <div class="info-row"><span class="info-label">Alan</span><span class="info-value">${esc((s.receiverName || '') + ' ' + (s.receiverSurname || ''))}</span></div>
            <div class="info-row"><span class="info-label">Çatdırılma ünvanı</span><span class="info-value">${esc(s.receiverAddress || '—')}</span></div>
            <div class="info-row"><span class="info-label">Çəki</span><span class="info-value">${esc(s.weight || 0)} kg</span></div>
            <div class="info-row"><span class="info-label">Daşınma növü</span><span class="info-value">${s.shipType === 'international' ? '🌍 Beynəlxalq' : '🇦🇿 Daxili'}</span></div>
            ${s.trackingCode ? `<div class="info-row"><span class="info-label">İzləmə kodu</span><span class="info-value">${esc(s.trackingCode)}</span></div>` : ''}
          </div>
        </div>
        <div class="tracking-footer">GoldExpress Kargo İdarəetmə Sistemi<br>Son yeniləmə: ${esc((s.createdAt || '').slice(0, 16))}</div>
      </div>
    </div>
  `;
}

function hasPermission(perm) {
  if (!currentUser) return false;
  if (currentRole === 'admin') return true;
  const perms = currentUser.permissions || DEFAULT_PERMISSIONS[currentRole] || DEFAULT_PERMISSIONS.operator;
  return perms[perm] === 1;
}

window.sendWhatsApp = function(phone, shipmentId, status, customerName) {
  const formattedPhone = formatPhoneNumber(phone);
  if (!formattedPhone) {
    showNotification('Telefon nömrəsi tapılmadı və ya yanlışdır!', 'e');
    return;
  }
  const siteUrl = window.location.origin + window.location.pathname;
  const trackingLink = `${siteUrl}?track=${encodeURIComponent(shipmentId)}`;
  const cleanName = (customerName || '').trim() || 'Hörmətli müştəri';
  const message = `📦 *GoldExpress Kargo* 📦\n\nSalam ${cleanName},\n\nSizin bağlamanızın yeni statusu:\n▸ Bağlama ID: *${shipmentId}*\n▸ Status: *${STATUS_LABELS[status] || status}*\n\n🔗 İzləmə linki: ${trackingLink}\n\nBağlamanızın cari vəziyyətini yuxarıdakı linkdən izləyə bilərsiniz.\n\nTəşəkkür edirik! 🚀\nGoldExpress Komandası`;
  const waUrl = `https://wa.me/${formattedPhone.replace('+','')}?text=${encodeURIComponent(message)}`;
  window.open(waUrl, '_blank');
};

function renderTable(list) {

window.exportToCSV = function() {
  const csvEsc = v => `"${String(v ?? '').replace(/"/g, '""')}"`;
  let csv = "ID,Göndərən Ad,Soyad,Telefon,Alan Ad,Soyad,Telefon,Ünvan,Çəki,Məbləğ,Status,Tarix,Tracking Code,Daşınma Növü\n";
  shipments.forEach(s=>{
    csv += [s.id, s.senderName, s.senderSurname, s.senderPhone, s.receiverName, s.receiverSurname,
      s.receiverPhone, s.receiverAddress, s.weight||0, s.shipPrice||0,
      STATUS_LABELS[s.status]||s.status, s.createdAt, s.trackingCode, s.shipType||'domestic']
      .map(csvEsc).join(',') + "\n";
  });
  const blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
  link.download = "goldexpress_"+new Date().toISOString().slice(0,10)+".csv"; link.click();
  setTimeout(() => URL.revokeObjectURL(link.href), 1000);
  showNotification("CSV faylı yükləndi","i");
};

// CSV row parser that handles quoted fields with commas inside
function parseCSVRow(row) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < row.length; i++) {
    const c = row[i];
    if (inQ) {
      if (c === '"' && row[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { result.push(cur); cur = ''; }
      else cur += c;
    }
  }
  result.push(cur);
  return result;
}

window.importCSV = function() {
  const file = document.getElementById('csvImportFile').files[0];
  if(!file){showNotification("Fayl seçin","e");return;}
  const reader = new FileReader();
  reader.onload = async function(e) {
    const text = e.target.result.replace(/^\uFEFF/, ''); // strip BOM
    const lines = text.split(/\r?\n/);
    let imported = 0, skipped = 0, errors = 0;
    for(let i=1;i<lines.length;i++){
      if(!lines[i].trim()) continue;
      const values = parseCSVRow(lines[i]);
      if(values.length<5) { skipped++; continue; }
      const id = (values[0]||'').trim() || generateId();
      if(shipments.find(s=>s.id===id)) { skipped++; continue; }
      const data = {
        id,
        senderName: (values[1]||'').trim(),
        senderSurname: (values[2]||'').trim(),
        senderPhone: (values[3]||'').trim(),
        receiverName: (values[4]||'').trim(),
        receiverSurname: (values[5]||'').trim(),
        receiverPhone: (values[6]||'').trim(),
        receiverAddress: (values[7]||'').trim(),
        weight: parseFloat(values[8]) || 0,
        shipPrice: parseFloat(values[9]) || 0,
        status: 'created',
        createdAt: getCurrentTime(),
        trackingCode: (values[12]||'').trim(),
        shipType: ((values[13]||'').trim() === 'international') ? 'international' : 'domestic',
        createdBy: currentUser?.id || 'admin1',
        createdByName: currentUser?.name || 'Admin'
      };
      try{ await setDoc(doc(db,'shipments',id),data); imported++; }catch(err){ errors++; }
    }
    showNotification(`${imported} idxal edildi${skipped?', '+skipped+' atlandı':''}${errors?', '+errors+' xəta':''} ✅`,'i');
    closeModal('modalImport');
    document.getElementById('csvImportFile').value = '';
  };
  reader.readAsText(file,'UTF-8');
};

window.changeShipmentStatus = async function(id,newStatus) {
  const s = shipments.find(s=>s.id===id); if(!s) return;
  const statuses = s.shipType==='domestic'?DOMESTIC_STATUSES:INTERNATIONAL_STATUSES;
  const curIdx=statuses.indexOf(s.status), newIdx=statuses.indexOf(newStatus);
  if(newIdx<=curIdx){showNotification('Status geri alına bilməz','e');return;}
  if(newIdx>curIdx+1 && currentRole!=='admin'){showNotification(`Növbəti addım: ${STATUS_LABELS[statuses[curIdx+1]]}`,'e');return;}
  try{
    await updateDoc(doc(db,'shipments',id),{status:newStatus});
    await addDoc(collection(db,'history'),{action:newStatus,message:`${id}: ${STATUS_LABELS[s.status]} → ${STATUS_LABELS[newStatus]} (İcra edən: ${currentUser?.name} / ${ROLE_LABELS[currentRole]})`,user:currentUser?.name||'—',role:currentRole,time:getCurrentTime()});
    showNotification(`Status: ${STATUS_LABELS[newStatus]} ✅`,'s');
    closeModal('modalDetail');
  }catch(e){showNotification('Xəta: '+e.message,'e');}
};

window.rollbackShipmentStatus = async function(id,prevStatus) {

};

async function onQRScanSuccess(decodedText) {
  if(scannerInstance) try{ await scannerInstance.stop(); scannerInstance.clear(); scannerInstance=null; }catch(e){}
  const s = shipments.find(s=>s.id===decodedText);
  const res = document.getElementById('scanResultArea');
  if(!s){ res.innerHTML=`<div style="background:rgba(230,57,70,.1);border-radius:12px;padding:16px;text-align:center"><div style="color:var(--red);font-weight:700">❌ ${esc(decodedText)} tapılmadı</div></div>`; return; }
  const statuses = s.shipType==='domestic'?DOMESTIC_STATUSES:INTERNATIONAL_STATUSES;
  const idx = statuses.indexOf(s.status);
  const expectedNext = ROLE_TO_NEXT_STATUS[currentRole] ? ROLE_TO_NEXT_STATUS[currentRole][s.shipType||'domestic'] : null;
  let autoMsg = '';
  if(expectedNext && currentRole!=='admin' && statuses.indexOf(expectedNext)>idx){
    try{
      await updateDoc(doc(db,'shipments',decodedText),{status:expectedNext});
      await addDoc(collection(db,'history'),{action:expectedNext,message:`${decodedText}: ${STATUS_LABELS[s.status]} → ${STATUS_LABELS[expectedNext]} [QR skan - ${currentUser?.name} / ${ROLE_LABELS[currentRole]}]`,user:currentUser?.name||'—',role:currentRole,time:getCurrentTime()});
      autoMsg=`<div style="background:rgba(34,197,94,.15);border-radius:10px;padding:12px;margin-top:12px;color:var(--green);text-align:center;font-weight:700">✅ Status dəyişdirildi: ${esc(STATUS_LABELS[expectedNext])}<br><small>İcra edən: ${esc(currentUser?.name||'')} (${esc(ROLE_LABELS[currentRole]||'')})</small></div>`;
      showSync('Status dəyişdirildi','ok');
    }catch(e){ autoMsg=`<div style="color:var(--red);padding:10px">Xəta: ${esc(e.message)}</div>`; }
  } else { autoMsg=`<div style="color:var(--t2);padding:12px;text-align:center">📌 Cari status: <strong>${esc(STATUS_LABELS[s.status]||s.status)}</strong><br><small>Sizin rolunuz (${esc(ROLE_LABELS[currentRole]||currentRole)}) bu mərhələdə status dəyişə bilməz</small></div>`; }
  const sid = escAttr(decodedText);
  res.innerHTML = `<div style="background:rgba(34,197,94,.08);border-radius:14px;padding:16px"><div style="font-family:'IBM Plex Mono',monospace;color:var(--gold);font-weight:700">📦 ${esc(decodedText)}</div><div style="margin:8px 0">${esc((s.senderName||'')+' '+(s.senderSurname||''))} → ${esc(s.receiverName||'')}</div><div><span class="stb ${STATUS_CLASS[s.status]||'s1'}">${esc(STATUS_LABELS[s.status]||s.status)}</span> <span style="margin-left:8px">${s.shipType==='international'?'🌍 Beynəlxalq':'🇦🇿 Daxili'}</span></div>${autoMsg}<div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap"><button class="btn btn-wa btn-sm" onclick="sendWhatsApp('${escAttr(s.receiverPhone||'')}','${sid}','${escAttr(expectedNext||s.status)}','${escAttr((s.receiverName||'')+' '+(s.receiverSurname||''))}');closeScanner()"><i class="fab fa-whatsapp"></i> WhatsApp</button><button class="btn btn-ghost btn-sm" onclick="closeScanner();viewShipmentDetails('${sid}')">Detallar</button><button class="btn btn-ghost btn-sm" onclick="closeScanner()">Bağla</button></div></div>`;
}

window.saveEmployee = async function() {
  const id=document.getElementById('employeeId').value;
  const name=document.getElementById('employeeName').value.trim(), surname=document.getElementById('employeeSurname').value.trim();
  const username=document.getElementById('employeeUsername').value.trim(), password=document.getElementById('employeePassword').value.trim();
  if(!name||!surname||!username||!password){showNotification('Ad, soyad, istifadəçi adı, şifrə tələb olunur','e');return;}
  // Check duplicate username (when adding new or editing different user)
  const dup = employees.find(e => e.username === username && e.id !== id);
  if (dup) { showNotification('Bu istifadəçi adı artıq mövcuddur','e'); return; }
  const permissions={}; PERMISSION_KEYS.forEach(k=>{const el=document.getElementById('perm_'+k); permissions[k]=el&&el.checked?1:0;});
  const data={name,surname,username,password,role:document.getElementById('employeeRole').value,phone:document.getElementById('employeePhone').value.trim(),email:document.getElementById('employeeEmail').value.trim(),active:parseInt(document.getElementById('employeeStatus').value),permissions};
  try{
    const docId=id||('emp_'+Date.now().toString(36));
    await setDoc(doc(db,'employees',docId),{...data,id:docId});
    showNotification(`İşçi ${id?'yeniləndi':'əlavə edildi'} ✅`,'s');
    closeModal('modalEmployee');
  }catch(e){showNotification('Xəta: '+e.message,'e');}
};
window.deleteEmployee = async function(id,name){
  if(id===currentUser?.id){showNotification('Öz hesabınızı silə bilməzsiniz','e');return;}
  const target = employees.find(e => e.id === id);
  if (target?.role === 'admin') {
    const activeAdmins = employees.filter(e => e.role === 'admin' && (e.active === 1 || e.active === undefined));
    if (activeAdmins.length <= 1) {
      showNotification('Sistemin son adminini silmək olmaz','e');
      return;
    }
  }
  if(!confirm(`"${name}" silinsin?`)) return;
  try{ await deleteDoc(doc(db,'employees',id)); showNotification('Silindi','i'); }catch(e){showNotification('Xəta: '+e.message,'e');}
};

window.doLogin = async function() {
  const u=document.getElementById('loginUsername').value.trim(), p=document.getElementById('loginPassword').value;
  if(!u||!p){showNotification('İstifadəçi adı və şifrə daxil edin','e');return;}
  const user=employees.find(e=>e.username===u && e.password===p && e.active!==0);
  if(!user){showNotification('İstifadəçi adı və ya şifrə yanlışdır','e');return;}
  currentUser=user; currentRole=user.role;
  document.getElementById('loginWrap').style.display='none'; document.getElementById('app').style.display='block';
  document.getElementById('userAvatar').textContent=(user.name||'?').charAt(0);
  document.getElementById('userName').textContent=(user.name||'')+' '+(user.surname||'');
  document.getElementById('userRoleLabel').textContent=ROLE_LABELS[currentRole]||currentRole;
  buildSidebar(); changePage('dashboard');
  showNotification(`Xoş gəldiniz, ${user.name}! 👋`,'s');
};
window.doLogout = function() {
  if(!confirm('Sistemdən çıxmaq istəyirsiniz?')) return;
  document.getElementById('app').style.display='none';
  currentUser=null; currentRole='admin'; currentPage='dashboard';
  document.getElementById('loginUsername').value=''; document.getElementById('loginPassword').value='';
  document.getElementById('loginWrap').style.display='flex';
  setTimeout(()=>document.getElementById('loginUsername')?.focus(),100);
  showNotification('Sistemdən çıxıldı','i');
};

  `;
  
  // Initialize Firebase listeners for the app
  unsubShipments = onSnapshot(query(collection(db,'shipments'),orderBy('createdAt','desc')), snap => {
    shipments = snap.docs.map(d=>({...d.data()}));
    if (currentUser && ['dashboard','shipments','warehouse','courier','report','finance','customers'].includes(currentPage)) {
      // Preserve search/filter state on shipments page
      if (currentPage === 'shipments') {
        const oldQ = document.getElementById('searchInput')?.value || '';
        const oldSt = document.getElementById('statusFilter')?.value || 'all';
        renderPage(currentPage);
        const sInp = document.getElementById('searchInput');
        const sSel = document.getElementById('statusFilter');
        if (sInp) sInp.value = oldQ;
        if (sSel) sSel.value = oldSt;
        if (oldQ || oldSt !== 'all') applyFilters();
      } else {
        renderPage(currentPage);
      }
    }
    showSync('Sinxronlaşdı','ok');
  }, err => {
    console.error('Shipments listener error:', err);
    showNotification('Verilənlər bazası xətası: '+err.message, 'e');
  });
  unsubEmployees = onSnapshot(collection(db,'employees'), snap => {
    if (snap.empty) {
      DEFAULT_EMPLOYEES.forEach(e => setDoc(doc(db,'employees',e.id), e));
      employees = [...DEFAULT_EMPLOYEES];
    } else {
      employees = snap.docs.map(d=>({...d.data()}));
    }
    if (currentPage === 'employees' && currentUser) renderPage('employees');
  }, err => console.error('Employees listener error:', err));
  
  setTimeout(()=>{ document.getElementById('loadingOverlay')?.classList.add('out'); },500);
}
