<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.0">
<title>GoldExpress — Kargo İdarəetmə v12</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root {
  --bg:#0a0a14;--surface:#12121f;--card:#18182b;--border:rgba(255,255,255,0.06);
  --gold:#f0a500;--gold-dim:rgba(240,165,0,0.15);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.15);
  --red:#e63946;--red-dim:rgba(230,57,70,0.15);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.15);
  --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.15);
  --cyan:#06b6d4;
  --text:#eaeaef;--text2:#a0a0b8;--text3:#6a6a88;
  --radius:14px;--sidebar-w:260px;
  font-size:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans','Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
select option,select optgroup{background:var(--card)!important;color:var(--text)!important}

/* ===== TRACKING ===== */
.track-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 30%,rgba(240,165,0,.06) 0%,transparent 60%),var(--bg)}
.track-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px 24px;width:100%;max-width:520px}
.track-head{text-align:center;margin-bottom:20px}
.track-head .logo{font-size:3rem;margin-bottom:8px}
.track-head h1{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--gold),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.track-id-block{text-align:center;margin-bottom:20px}
.track-id-block .lbl{color:var(--text3);font-size:.65rem;text-transform:uppercase;letter-spacing:1px}
.track-id-block .val{font-family:'IBM Plex Mono',monospace;font-size:1.2rem;font-weight:700;color:var(--gold);margin-top:4px}
.track-status-badge{text-align:center;margin:16px 0}
.step-row{display:flex;align-items:center}
.step-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;border:2px solid var(--border);flex-shrink:0;background:var(--surface)}
.step-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.step-dot.curr{background:var(--gold);border-color:var(--gold);color:#000}
.step-dot.pend{background:transparent;border-color:var(--border);color:var(--text3)}
.step-info{margin-left:12px;flex:1}
.step-info .title{font-weight:700;color:#fff;font-size:.85rem}
.step-info .date{font-size:.65rem;color:var(--text3);margin-top:2px}
.step-line{width:2px;height:22px;margin-left:17px;background:var(--border)}
.step-line.done{background:var(--green)}
.track-info{margin-top:20px}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.info-row .lbl{color:var(--text3);font-size:.78rem}
.info-row .val{color:#fff;font-weight:500;font-size:.78rem;text-align:right;max-width:60%}
.track-foot{text-align:center;margin-top:20px;color:var(--text3);font-size:.65rem}

/* ===== LOGIN ===== */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 30% 40%,rgba(240,165,0,.05) 0%,transparent 70%),var(--bg)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:40px 32px;width:100%;max-width:400px;text-align:center}
.login-card .logo{font-size:3rem;margin-bottom:10px}
.login-card h1{font-size:1.6rem;font-weight:900;background:linear-gradient(135deg,var(--gold),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.login-card .sub{color:var(--text3);font-size:.75rem;margin-bottom:20px}
.inp-wrap{position:relative;margin-bottom:14px}
.inp-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.inp-wrap input{width:100%;padding:12px 40px 12px 42px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:.9rem;outline:none}
.inp-wrap input:focus{border-color:var(--gold)}
.inp-wrap .toggle-pwd{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:.9rem;padding:4px}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),#c78500);border:none;border-radius:12px;color:#000;font-weight:800;font-size:.95rem;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;transition:transform .15s,box-shadow .15s}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(240,165,0,.2)}
.login-hint{margin-top:16px;font-size:.65rem;color:var(--text3);background:rgba(255,255,255,.03);padding:10px;border-radius:10px;line-height:1.8}

/* ===== LAYOUT ===== */
.app{display:none;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:rgba(15,15,27,.9);backdrop-filter:blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;height:100vh;z-index:100}
.sb-head{padding:24px 20px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sb-head .ico{font-size:1.8rem}
.sb-head h3{color:var(--gold);font-size:1rem;font-weight:800}
.sb-head span{color:var(--text3);font-size:.7rem}
.sb-nav{flex:1;overflow-y:auto;padding:12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;color:var(--text2);font-size:.85rem;font-weight:600;background:none;border:none;width:100%;text-align:left;cursor:pointer;transition:background .15s}
.nav-item:hover{background:rgba(255,255,255,.04);color:#fff}
.nav-item.active{background:var(--gold-dim);color:var(--gold)}
.nav-item i{width:20px;text-align:center}
.sb-sec{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:8px 14px;margin-top:4px}
.sb-user{padding:12px;border-top:1px solid var(--border)}
.btn-scan{width:100%;padding:12px;border-radius:12px;background:var(--gold-dim);border:1px solid rgba(240,165,0,.25);color:var(--gold);font-weight:700;font-size:.85rem;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.btn-scan:hover{background:rgba(240,165,0,.22)}
.sb-user-row{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,.03);border-radius:14px;margin-bottom:8px}
.sb-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--red));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:1rem;flex-shrink:0}
.sb-user-info h4{color:#fff;font-size:.85rem}
.sb-user-info span{color:var(--text3);font-size:.65rem}
.logout-btn{width:100%;padding:12px;border-radius:12px;background:var(--red-dim);border:1px solid rgba(230,57,70,.25);color:var(--red);font-weight:700;font-size:.85rem;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:background .15s}
.logout-btn:hover{background:rgba(230,57,70,.22)}
.main-area{margin-left:var(--sidebar-w);min-height:100vh}
.page{padding:28px 32px;max-width:1400px}

/* ===== PAGE HEAD ===== */
.page-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:15px}
.page-head h2{font-size:1.3rem;font-weight:800;display:flex;align-items:center;gap:10px}
.page-head h2 i{color:var(--gold)}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;font-size:.8rem;font-weight:700;border:none;cursor:pointer;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.25)}
.btn:active{transform:translateY(0)}
.btn-gold{background:linear-gradient(135deg,var(--gold),#c78500);color:#000}
.btn-green{background:linear-gradient(135deg,var(--green),#15803d);color:#fff}
.btn-blue{background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff}
.btn-ghost{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text2)}
.btn-red{background:linear-gradient(135deg,var(--red),#b91c1c);color:#fff}
.btn-purple{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff}
.btn-sm{padding:7px 16px;font-size:.75rem;border-radius:9px}

/* ===== STATS ===== */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:transform .2s,border-color .2s}
.stat-card:hover{transform:translateY(-4px);border-color:rgba(240,165,0,.2)}
.stat-card .icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:12px}
.stat-card.c1 .icon{background:var(--red-dim);color:var(--red)}
.stat-card.c2 .icon{background:var(--gold-dim);color:var(--gold)}
.stat-card.c3 .icon{background:var(--blue-dim);color:var(--blue)}
.stat-card.c4 .icon{background:var(--green-dim);color:var(--green)}
.stat-card.c5 .icon{background:var(--purple-dim);color:var(--purple)}
.stat-card h3{font-size:1.8rem;font-weight:800;color:#fff}
.stat-card p{color:var(--text3);font-size:.7rem}

/* ===== TABLE ===== */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow-x:auto}
.table-head,.table-row{display:grid;grid-template-columns:110px 150px 80px 140px 130px 110px 100px 110px;padding:12px 18px;gap:8px;align-items:center}
.table-head{background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);color:var(--text3);font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.table-row{border-bottom:1px solid rgba(255,255,255,.03);font-size:.8rem;transition:background .15s}
.table-row:hover{background:rgba(255,255,255,.02)}
.table-row .id{font-family:'IBM Plex Mono',monospace;color:var(--gold);font-weight:700;cursor:pointer;font-size:.78rem}
.badge{padding:5px 10px;border-radius:20px;font-size:.6rem;font-weight:700;display:inline-block;white-space:nowrap}
.badge.created{background:rgba(80,80,106,.3);color:#a0a0b8}
.badge.courier_pickup{background:var(--blue-dim);color:var(--blue)}
.badge.warehouse_az{background:var(--gold-dim);color:var(--gold)}
.badge.sent_to_tr{background:var(--blue-dim);color:var(--blue)}
.badge.warehouse_tr{background:var(--purple-dim);color:var(--purple)}
.badge.international{background:rgba(6,182,212,.15);color:var(--cyan)}
.badge.arrived{background:var(--green-dim);color:var(--green)}
.badge.courier_delivery{background:rgba(59,130,246,.2);color:#60a5fa}
.badge.delivered{background:var(--green-dim);color:#4ade80}
.badge.done{background:rgba(34,197,94,.25);color:#4ade80}
.actions-bar{display:flex;gap:6px;flex-wrap:wrap}
.action-btn{width:30px;height:30px;border-radius:9px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:transform .15s,filter .15s}
.action-btn:hover{transform:translateY(-2px);filter:brightness(1.2)}
.act-view{background:var(--blue-dim);color:var(--blue)}
.act-qr{background:var(--gold-dim);color:var(--gold)}
.act-edit{background:rgba(255,255,255,.07);color:var(--text2)}
.act-wa{background:rgba(37,211,102,.15);color:#25D366}
.act-print{background:var(--purple-dim);color:var(--purple)}
.act-del{background:var(--red-dim);color:var(--red)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state i{font-size:3rem;display:block;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:.85rem}

/* ===== MODALS ===== */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);z-index:1000;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:28px;max-width:720px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:modalIn .22s cubic-bezier(.4,0,.2,1)}
.modal.wide{max-width:880px}
.modal.narrow{max-width:480px}
.modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.06);border:none;color:var(--text3);width:32px;height:32px;border-radius:10px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .15s}
.modal-close:hover{background:rgba(255,255,255,.12);color:#fff}
.modal-title{font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.modal-title i{color:var(--gold)}
.section-label{font-size:.65rem;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin:18px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--gold-dim);font-weight:700}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.form-group{margin-bottom:14px}
.form-group label{display:block;color:var(--text2);font-size:.73rem;margin-bottom:5px}
.form-input{width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:11px;color:var(--text);font-size:.85rem;outline:none}
.form-input:focus{border-color:var(--gold)}
select.form-input{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%23a0a0b8' d='M6 8L0 0h12z'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:36px}
.save-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),#c78500);border:none;border-radius:12px;color:#000;font-size:.9rem;font-weight:800;cursor:pointer;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s}
.save-btn:hover{transform:translateY(-2px)}
input::placeholder,textarea::placeholder{color:var(--text3);opacity:.7}

/* ===== DETAIL ===== */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.detail-card{background:rgba(255,255,255,.04);padding:13px;border-radius:11px;border:1px solid var(--border)}
.detail-card label{color:var(--text3);font-size:.6rem;display:block;margin-bottom:3px}
.detail-card span{color:#fff;font-size:.85rem;font-weight:600}
.detail-card.full{grid-column:1/-1}
.detail-card.gold{background:rgba(240,165,0,.08);border-color:rgba(240,165,0,.25)}
.detail-card.gold label{color:var(--gold)}
.status-buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.status-btn{padding:11px 18px;border:none;border-radius:11px;font-size:.78rem;font-weight:700;cursor:pointer;min-width:120px;display:inline-flex;align-items:center;gap:8px;transition:transform .15s}
.status-btn:hover{transform:translateY(-2px)}
.status-next{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.status-prev{background:rgba(230,57,70,.12);color:var(--red);border:1px solid rgba(230,57,70,.25)}

/* ===== PROGRESS ===== */
.progress-track{display:flex;align-items:center;margin:16px 0;overflow-x:auto;padding:8px 0}
.prog-step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:65px}
.prog-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;border:2px solid var(--border);background:var(--surface)}
.prog-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.prog-dot.current{background:var(--gold);border-color:var(--gold);color:#000}
.prog-label{font-size:.6rem;color:var(--text3);text-align:center}
.prog-line{flex:1;height:2px;background:var(--border);margin-bottom:22px}
.prog-line.done{background:var(--green)}

/* ===== MISC ===== */
.history-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.history-item .h-text{flex:1}
.history-item .h-text strong{color:#fff;font-size:.82rem}
.history-item .h-time{color:var(--text3);font-size:.68rem;white-space:nowrap;margin-left:auto}
.employee-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.emp-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.emp-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.emp-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--red));display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;color:#fff;flex-shrink:0}
.emp-info h4{color:#fff;font-size:.95rem;margin-bottom:4px}
.role-badge{padding:3px 10px;border-radius:20px;font-size:.6rem;font-weight:700}
.role-admin{background:var(--red-dim);color:var(--red)}
.role-operator{background:var(--purple-dim);color:var(--purple)}
.role-warehouse{background:var(--gold-dim);color:var(--gold)}
.role-courier{background:var(--blue-dim);color:var(--blue)}
.role-manager{background:var(--green-dim);color:var(--green)}
.emp-details{color:var(--text2);font-size:.78rem;line-height:1.9}
.emp-details p{display:flex;align-items:center;gap:8px}
.emp-details i{color:var(--text3);width:14px}
.emp-card .actions{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:flex;gap:8px}
.profile-card{background:var(--card);border-radius:14px;padding:28px;max-width:500px}
.profile-header{display:flex;align-items:center;gap:20px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.profile-avatar{width:75px;height:75px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--red));display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff;flex-shrink:0}
.profile-info h3{color:#fff;font-size:1.2rem;margin-bottom:4px}
.profile-info span{color:var(--gold);font-size:.85rem;font-weight:600}
.profile-details{color:var(--text2);font-size:.85rem;line-height:2}
.profile-details i{color:var(--text3);width:18px;margin-right:6px}
.finance-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.finance-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;text-align:center}
.finance-card p{color:var(--text3);font-size:.7rem;text-transform:uppercase;margin-bottom:8px;letter-spacing:.5px}
.finance-card h3{font-size:1.6rem;font-weight:800}
.search-bar{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.search-box{position:relative;flex:1;min-width:200px}
.search-box i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.85rem;pointer-events:none}
.search-box input{width:100%;padding:11px 14px 11px 40px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:11px;color:var(--text);font-size:.85rem;outline:none}
.search-box input:focus{border-color:var(--gold)}
.toast-box{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:340px}
.toast{padding:12px 16px;border-radius:12px;background:rgba(22,22,34,.98);border-left:3px solid var(--green);display:flex;align-items:center;gap:10px;font-size:.8rem;animation:slideIn .28s ease}
.toast.error{border-left-color:var(--red)}
.toast.success i{color:var(--green)}
.toast.error i{color:var(--red)}
.sync-dot{position:fixed;bottom:20px;right:20px;padding:8px 16px;border-radius:40px;font-size:.7rem;background:var(--card);border:1px solid var(--border);opacity:0;transition:opacity .25s;display:flex;align-items:center;gap:6px;pointer-events:none}
.sync-dot.visible{opacity:1}
.sync-dot.ok{background:rgba(34,197,94,.9);color:#fff;border-color:var(--green)}

/* ===== PRINT ===== */
.pd{padding:14px;border:2px dashed #999;margin-bottom:12px;font-family:'IBM Plex Mono',monospace;color:#000;background:#fff;page-break-after:always}
.pd .clabel{text-align:center;font-weight:800;font-size:11px;background:#000;color:#fff;padding:4px;border-radius:4px;margin-bottom:8px;letter-spacing:1px}
.pd .qr-c{text-align:center;margin:8px 0}
.pd .onum{text-align:center;font-size:18px;font-weight:800;letter-spacing:2px;margin:6px 0;border:2px solid #000;padding:6px;border-radius:6px}
@media print{body *{visibility:hidden}#printArea,#printArea *{visibility:visible}#printArea{position:absolute;left:0;top:0;width:100%;display:block!important}.pd{border:2px solid #000;page-break-inside:avoid}}

/* ===== RESPONSIVE ===== */
@media(max-width:850px){
  :root{--sidebar-w:70px}
  .sb-head h3,.sb-head span,.nav-item span,.sb-user-row,.logout-btn span,.btn-scan span,.sb-sec{display:none}
  .nav-item{justify-content:center;padding:12px}
  .page{padding:16px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .form-grid,.form-grid3{grid-template-columns:1fr}
  .table-head,.table-row{min-width:800px}
  .finance-row{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:6px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#3a3a4e}
*:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}

/* ===== ANIMATIONS ===== */
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
</style>
</head>
<body>

<div id="appRoot"></div>
<div id="loadingScreen" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:9998;transition:opacity .35s">

</div>

<!-- ===== MODALS ===== -->
<div id="modalNew" class="overlay">
  <div class="modal wide">
    <button class="modal-close" onclick="closeModal('modalNew')">&times;</button>
    <div class="modal-title"><i class="fas fa-plus-circle" style="color:var(--green)"></i> Yeni Bağlama Yarat</div>

      <div class="form-group"><label>Bağlama ID</label><input id="fNewId" class="form-input" readonly></div>
      <div class="form-group"><label>Kateqoriya</label><select id="fNewCat" class="form-input"><option>Sənəd</option><option>Bağlama</option><option>Sənəd Dövlət qurumları</option><option>Elektronika</option><option>Geyim</option></select></div>
      <div class="form-group"><label>Ödəniş</label><select id="fNewPay" class="form-input"><option>Nağd</option><option>Kart</option><option>Bank</option></select></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Çəki (kg)</label><input id="fNewWeight" class="form-input" type="number" step="0.1"></div>
      <div class="form-group"><label>Məbləğ (AZN)</label><input id="fNewPrice" class="form-input" type="number" step="0.01"></div>
      <div class="form-group"><label>Daşınma növü</label><select id="fNewShip" class="form-input"><option value="domestic">🇦🇿 Daxili</option><option value="international">🌍 Beynəlxalq</option></select></div>
      <div class="form-group"><label>Təsvir</label><input id="fNewDesc" class="form-input"></div>

    <div class="section-label">Göndərən</div>
    <div class="form-grid">
      <div class="form-group"><label>Ad</label><input id="fNewSName" class="form-input"></div>
      <div class="form-group"><label>Soyad</label><input id="fNewSSurname" class="form-input"></div>
      <div class="form-group"><label>Telefon</label><input id="fNewSPhone" class="form-input"></div>
      <div class="form-group"><label>Ünvan</label><input id="fNewSAddr" class="form-input"></div>
    </div>
    <div class="section-label">Alan</div>
    <div class="form-grid">
      <div class="form-group"><label>Ad</label><input id="fNewRName" class="form-input"></div>
      <div class="form-group"><label>Soyad</label><input id="fNewRSurname" class="form-input"></div>
      <div class="form-group"><label>Telefon</label><input id="fNewRPhone" class="form-input"></div>

    </div>
    <button class="save-btn" onclick="createShipment()"><i class="fas fa-save"></i> Bağlamanı Yarat</button>

<div id="modalDetail" class="overlay"><div class="modal wide"><button class="modal-close" onclick="closeModal('modalDetail')">&times;</button><div id="detailContent"></div></div></div>
<div id="modalEdit" class="overlay"><div class="modal wide"><button class="modal-close" onclick="closeModal('modalEdit')">&times;</button><div id="editContent"></div></div></div>

<div id="modalQR" class="overlay">

    <button class="modal-close" onclick="closeModal('modalQR')">&times;</button>

      <div style="font-family:'IBM Plex Mono',monospace;color:var(--gold);font-size:1rem;margin-top:10px;font-weight:700;letter-spacing:1px" id="qrIdLabel"></div>

      <button class="btn btn-gold" onclick="printQR()"><i class="fas fa-print"></i> Çap</button>

</div>

<div id="modalScan" class="overlay">

      <div class="form-group"><label>Ad</label><input id="empName" class="form-input"></div>

      <div class="form-group"><label>Şifrə</label><input id="empPass" class="form-input"></div>
      <div class="form-group"><label>Rol</label><select id="empRole" class="form-input"><option value="admin">Admin</option><option value="operator">Operator</option><option value="warehouse">Anbar</option><option value="courier">Kuryer</option><option value="manager">Menecer</option></select></div>
      <div class="form-group"><label>Status</label><select id="empActive" class="form-input"><option value="1">Aktiv</option><option value="0">Deaktiv</option></select></div>
    </div>

</div>

<div id="modalImport" class="overlay">
  <div class="modal narrow">
    <button class="modal-close" onclick="closeModal('modalImport')">&times;</button>
    <div class="modal-title"><i class="fas fa-upload"></i> CSV İdxal</div>
    <div class="form-group"><label>CSV fayl seçin</label><input type="file" id="csvFile" accept=".csv" class="form-input"></div>

  </div>
</div>

<div id="printArea" style="display:none"></div>
<div id="toastBox" class="toast-box"></div>
<div id="syncPill" class="sync-dot"><i class="fas fa-circle-check"></i><span>Sinxronlaşdı</span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, addDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fb = initializeApp({
  apiKey:"AIzaSyC3_5fQsbFVOW8aUL0erveEAJ3GrJNE0cQ",
  authDomain:"goldexpress-814f7.firebaseapp.com",
  projectId:"goldexpress-814f7",
  storageBucket:"goldexpress-814f7.firebasestorage.app",
  messagingSenderId:"435122002610",
  appId:"1:435122002610:web:3d6e6af72f14d55b2a87ab"
});
const db = getFirestore(fb);

// ===== CONSTANTS =====
const DOMESTIC     = ['created','courier_pickup','warehouse_az','courier_delivery','delivered','done'];
const INTERNATIONAL= ['created','courier_pickup','warehouse_az','sent_to_tr','warehouse_tr','international','arrived','courier_delivery','delivered','done'];

const LABEL={
  created:'Yaradıldı', courier_pickup:'Kuryer götürdü', warehouse_az:'AZ Anbarında',
  sent_to_tr:'Türkiyəyə göndərildi', warehouse_tr:'TR Ofisində',
  international:'Beynəlxalq daşınmada', arrived:'Təyinat ölkəsinə çatdı',
  courier_delivery:'Kuryer çatdırır', delivered:'Çatdırıldı', done:'Tamamlandı'
};
const BADGE_CLS={
  created:'created', courier_pickup:'courier_pickup', warehouse_az:'warehouse_az',
  sent_to_tr:'sent_to_tr', warehouse_tr:'warehouse_tr', international:'international',
  arrived:'arrived', courier_delivery:'courier_delivery', delivered:'delivered', done:'done'
};
const ROLES={admin:'Admin',operator:'Operator',warehouse:'Anbar',courier:'Kuryer',manager:'Menecer'};
const PERMS=['create','view','scan','status','print','delete','employees','finance','track','import','edit'];
const PERM_LABEL={
  create:'Yaratma',view:'Baxış',scan:'QR Skan',status:'Status dəyiş',print:'Çap',
  delete:'Sil',employees:'İşçilər',finance:'Maliyyə',track:'İzləmə',import:'CSV İdxal',edit:'Redaktə'
};
const DEF_PERM={
  admin:   {create:1,view:1,scan:1,status:1,print:1,delete:1,employees:1,finance:1,track:1,import:1,edit:1},
  operator:{create:1,view:1,scan:1,status:0,print:1,delete:0,employees:0,finance:0,track:1,import:0,edit:0},
  warehouse:{create:0,view:1,scan:1,status:0,print:0,delete:0,employees:0,finance:0,track:0,import:0,edit:0},
  courier: {create:0,view:1,scan:1,status:0,print:0,delete:0,employees:0,finance:0,track:0,import:0,edit:0},
  manager: {create:0,view:1,scan:0,status:0,print:0,delete:0,employees:1,finance:1,track:1,import:1,edit:0}
};
const DEFAULT_EMPLOYEES=[
  {id:'admin1',name:'Admin',  surname:'User',      username:'admin',    password:'admin123', role:'admin',    phone:'+994501234567',email:'admin@goldexpress.az',   active:1},
  {id:'op1',   name:'Leyla',  surname:'Məmmədova', username:'operator', password:'oper123',  role:'operator', phone:'+994551112233',email:'leyla@goldexpress.az',   active:1},
  {id:'wh1',   name:'Rəşad',  surname:'Əliyev',    username:'warehouse',password:'anbar123', role:'warehouse',phone:'+994501112233',email:'reshad@goldexpress.az',  active:1},
  {id:'cr1',   name:'Tural',  surname:'İbrahimov', username:'courier',  password:'kuryer123',role:'courier',  phone:'+994551122334',email:'tural@goldexpress.az',   active:1}
];

// ===== STATE =====
let shipments=[], employees=[], currentUser=null, currentRole='', currentPage='dashboard', scanner=null;
let unsubShip=null, unsubEmp=null, activeQRId=null, searchTimer=null;

// ===== HELPERS =====
const esc=v=>v==null?'':String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
const escA=v=>esc(v).replace(/\\/g,'\\\\');
const now=()=>new Date().toISOString().slice(0,16).replace('T',' ');
const genId=()=>'GE-'+new Date().getFullYear()+'-'+Math.random().toString(36).slice(2,7).toUpperCase();
const toast=(msg,err=false)=>{
  const b=document.getElementById('toastBox');if(!b)return;
  const el=document.createElement('div');el.className='toast '+(err?'error':'success');
  el.innerHTML=`<i class="fas fa-${err?'exclamation-circle':'check-circle'}"></i><div>${esc(msg)}</div>`;
  b.appendChild(el);setTimeout(()=>el.remove(),4000);
};
const syncShow=()=>{
  const p=document.getElementById('syncPill');if(!p)return;
  p.classList.add('visible','ok');setTimeout(()=>p.classList.remove('visible'),2500);
};
const openModal=id=>document.getElementById(id)?.classList.add('open');
window.closeModal=id=>document.getElementById(id)?.classList.remove('open');
const can=p=>currentRole==='admin'||(currentUser?.permissions||DEF_PERM[currentRole]||{})[p]===1;

// ===== NEXT STATUS LOGIC =====
function nextStatus(current,role,shipType){
  const seq=shipType==='domestic'?DOMESTIC:INTERNATIONAL;
  const idx=seq.indexOf(current);
  if(idx<0||idx>=seq.length-1)return null;
  const nxt=seq[idx+1];
  switch(role){
    case 'operator': return current==='created'?'courier_pickup':null;
    case 'warehouse': return current==='courier_pickup'?'warehouse_az':(current==='warehouse_az'&&shipType==='international'?'sent_to_tr':null);
    case 'courier':
      if(current==='created')return 'courier_pickup';
      if(current==='warehouse_az'&&shipType==='domestic')return 'courier_delivery';
      if(current==='arrived'&&shipType==='international')return 'courier_delivery';
      return null;
    case 'manager': return ['sent_to_tr','warehouse_tr','international','arrived'].includes(current)?nxt:null;
    case 'admin': return nxt;
    default: return null;
  }
}

// ===== RENDER TABLE =====
function renderTable(list){
  if(!list.length)return'<div class="empty-state"><i class="fas fa-box-open"></i><p>Bağlama tapılmadı</p></div>';
  return`<div class="table-wrap"><div class="table-head"><div>ID</div><div>Göndərən</div><div>Çəki/Məbləğ</div><div>Alan</div><div>Ünvan</div><div>Tarix</div><div>Status</div><div>Əməliyyat</div></div>${list.map(s=>`<div class="table-row"><div class="id" onclick="viewDetail('${escA(s.id)}')">${esc(s.id)}</div><div>${esc(s.senderName||'')} ${esc(s.senderSurname||'')}<br><small style="color:var(--text3)">${esc(s.senderPhone||'')}</small></div><div>${esc(s.weight||0)}kg<br><span style="color:var(--gold)">${esc(s.shipPrice||0)}₼</span></div><div>${esc(s.receiverName||'')} ${esc(s.receiverSurname||'')}<br><small style="color:var(--text3)">${esc(s.receiverPhone||'')}</small></div><div><small style="color:var(--text2)">${esc((s.receiverAddress||'').substring(0,35))}</small></div><div><small style="color:var(--text3)">${esc((s.createdAt||'').slice(0,10))}</small></div><div><span class="badge ${BADGE_CLS[s.status]||'created'}">${esc(LABEL[s.status]||s.status)}</span></div><div class="actions-bar"><button class="action-btn act-view" title="Bax" onclick="viewDetail('${escA(s.id)}')"><i class="fas fa-eye"></i></button><button class="action-btn act-qr" title="QR" onclick="showQR('${escA(s.id)}')"><i class="fas fa-qrcode"></i></button>${can('edit')?`<button class="action-btn act-edit" title="Redaktə" onclick="editShip('${escA(s.id)}')"><i class="fas fa-pen"></i></button>`:''}<button class="action-btn act-wa" title="WhatsApp" onclick="sendWA('${escA(s.receiverPhone||'')}','${escA(s.id)}','${escA(s.status)}','${escA((s.receiverName||'')+' '+(s.receiverSurname||''))}')"><i class="fab fa-whatsapp"></i></button>${can('print')?`<button class="action-btn act-print" title="Çap" onclick="printLabel('${escA(s.id)}')"><i class="fas fa-print"></i></button>`:''}${can('delete')?`<button class="action-btn act-del" title="Sil" onclick="delShip('${escA(s.id)}')"><i class="fas fa-trash"></i></button>`:''}</div></div>`).join('')}</div>`;
}

function renderPage(p){
  const main=document.getElementById('mainContent');if(!main)return;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav_'+p)?.classList.add('active');

  if(p==='dashboard'){
    const cnt={created:0,warehouse_az:0,courier_delivery:0,delivered:0};
    shipments.forEach(s=>{if(cnt[s.status]!==undefined)cnt[s.status]++;else if(s.status==='done')cnt.delivered++;});
    main.innerHTML=`<div class="page"><div class="page-head"><h2><i class="fas fa-home"></i> Panel</h2><div style="display:flex;gap:10px;flex-wrap:wrap">${can('create')?'<button class="btn btn-green" onclick="openNewShipment()"><i class="fas fa-plus"></i> Yeni Bağlama</button>':''}<button class="btn btn-ghost" onclick="openScanner()"><i class="fas fa-qrcode"></i> QR Skan</button>${can('import')?`<button class="btn btn-purple" onclick="openModal('modalImport')"><i class="fas fa-upload"></i> CSV İdxal</button><button class="btn btn-blue" onclick="exportCSV()"><i class="fas fa-download"></i> CSV İxrac</button>`:''}</div></div><div class="stats-grid"><div class="stat-card c1" onclick="gotoStatus('created')"><div class="icon"><i class="fas fa-plus-circle"></i></div><h3>${cnt.created||0}</h3><p>Yaradıldı</p></div><div class="stat-card c2" onclick="gotoStatus('warehouse_az')"><div class="icon"><i class="fas fa-warehouse"></i></div><h3>${cnt.warehouse_az||0}</h3><p>Anbarda</p></div><div class="stat-card c3" onclick="gotoStatus('courier_delivery')"><div class="icon"><i class="fas fa-motorcycle"></i></div><h3>${cnt.courier_delivery||0}</h3><p>Kuryerdə</p></div><div class="stat-card c4" onclick="gotoStatus('delivered')"><div class="icon"><i class="fas fa-check-circle"></i></div><h3>${cnt.delivered||0}</h3><p>Çatdırıldı</p></div><div class="stat-card c5" onclick="changePage('shipments')"><div class="icon"><i class="fas fa-layer-group"></i></div><h3>${shipments.length}</h3><p>Ümumi</p></div></div>${renderTable(shipments.slice(0,15))}</div>`;
  }
  else if(p==='shipments'){
    main.innerHTML=`<div class="page"><div class="page-head"><h2><i class="fas fa-box"></i> Sifarişlər <span style="color:var(--text3);font-size:.8rem;font-weight:500" id="shipCount">(${shipments.length})</span></h2><div style="display:flex;gap:10px;flex-wrap:wrap">${can('create')?'<button class="btn btn-green" onclick="openNewShipment()"><i class="fas fa-plus"></i> Yeni</button>':''}${can('import')?'<button class="btn btn-blue" onclick="exportCSV()"><i class="fas fa-download"></i> CSV İxrac</button>':''}</div></div><div class="search-bar"><div class="search-box"><i class="fas fa-search"></i><input placeholder="ID, ad, telefon, izləmə kodu üzrə axtar..." oninput="filterTable()" id="searchInput"></div><select id="statusFilter" class="form-input" onchange="filterTable()" style="max-width:220px"><option value="all">Bütün statuslar</option>${Object.entries(LABEL).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></div><div id="tableArea">${renderTable(shipments)}</div></div>`;
  }
  else if(p==='warehouse'){
    const wh=shipments.filter(s=>['courier_pickup','warehouse_az'].includes(s.status));
    main.innerHTML=`<div class="page"><div class="page-head"><h2><i class="fas fa-warehouse"></i> Anbar Paneli <span style="color:var(--text3);font-size:.8rem">(${wh.length})</span></h2><button class="btn btn-ghost" onclick="openScanner()"><i class="fas fa-qrcode"></i> QR Skan</button></div>${renderTable(wh)}</div>`;
  }
  else if(p==='courier'){
    const cr=shipments.filter(s=>['courier_delivery','created'].includes(s.status));
    main.innerHTML=`<div class="page"><div class="page-head"><h2><i class="fas fa-motorcycle"></i> Kuryer Paneli <span style="color:var(--text3);font-size:.8rem">(${cr.length})</span></h2><button class="btn btn-ghost" onclick="openScanner()"><i class="fas fa-qrcode"></i> QR Skan</button></div>${renderTable(cr)}</div>`;
  }
  else if(p==='customers'){
    const cust={};
    shipments.forEach(s=>{const k=s.senderPhone||'unknown';if(!cust[k])cust[k]={name:(s.senderName||'')+' '+(s.senderSurname||''),phone:s.senderPhone||'—',count:0,total:0};cust[k].count++;cust[k].total+=parseFloat(s.shipPrice)||0;});

async function loadHistory(){
  try{
    const snap=await getDocs(query(collection(db,'history'),orderBy('time','desc')));
    const logs=snap.docs.map(d=>d.data()).slice(0,150);
    const h=document.getElementById('histList');
    if(h)h.innerHTML=logs.map(l=>`<div class="history-item"><div class="h-text"><strong>${esc(l.message||'')}</strong><p style="color:var(--text3);font-size:.7rem;margin-top:2px">${esc(l.user||'—')} (${esc(ROLES[l.role]||l.role||'')})</p></div><div class="h-time">${esc((l.time||'').slice(0,16))}</div></div>`).join('')||'<div class="empty-state"><i class="fas fa-history"></i><p>Tarixçə boşdur</p></div>';
  }catch(e){toast('Tarixçə yüklənmədi: '+e.message,true)}
}

// ===== SCANNER =====
window.openScanner=()=>{
  openModal('modalScan');
  document.getElementById('scannerView').innerHTML='';
  document.getElementById('scanResult').innerHTML='';
  try{
    scanner=new Html5Qrcode("scannerView");
    scanner.start({facingMode:"environment"},{fps:10,qrbox:{width:250,height:250}},
      async text=>{
        if(scanner){try{await scanner.stop();scanner.clear()}catch(e){}scanner=null;}
        await onQRResult(text.trim());
      },
      ()=>{}
    );
  }catch(e){
    document.getElementById('scannerView').innerHTML='<div style="padding:40px;text-align:center;color:var(--red)">📷 Kamera icazəsi tələb olunur</div>';
  }
};
window.closeScanner=()=>{
  closeModal('modalScan');
  if(scanner){scanner.stop().catch(()=>{}).finally(()=>scanner=null);}
};

async function onQRResult(text){
  const s=shipments.find(s=>s.id===text);
  const res=document.getElementById('scanResult');
  if(!s){res.innerHTML=`<div style="background:var(--red-dim);border-radius:12px;padding:16px;text-align:center;color:var(--red);font-weight:700">❌ ${esc(text)} tapılmadı</div>`;return;}
  const nxt=nextStatus(s.status,currentRole,s.shipType||'domestic');
  const needsManual=currentRole==='courier'&&s.status==='courier_delivery';

  if(nxt&&!needsManual){
    try{
      await updateDoc(doc(db,'shipments',text),{status:nxt});
      await addDoc(collection(db,'history'),{action:nxt,message:`${text}: ${LABEL[s.status]} → ${LABEL[nxt]} [QR skan - ${currentUser?.name}]`,user:currentUser?.name||'',role:currentRole,time:now()});
      res.innerHTML=`<div style="background:var(--green-dim);border-radius:12px;padding:16px;text-align:center;color:var(--green);font-weight:700">✅ Status dəyişdirildi: ${esc(LABEL[nxt])}<br><small style="color:var(--text2)">${esc(currentUser?.name||'')} (${esc(ROLES[currentRole]||'')})</small></div>`;
      syncShow();
    }catch(e){res.innerHTML=`<div style="color:var(--red);padding:10px">Xəta: ${esc(e.message)}</div>`;}
  }else{
    res.innerHTML=`<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px"><div style="font-family:'IBM Plex Mono',monospace;color:var(--gold);font-weight:700;margin-bottom:8px">📦 ${esc(s.id)}</div><div style="margin-bottom:6px">${esc((s.senderName||'')+' '+(s.senderSurname||''))} → <strong>${esc(s.receiverName||'')}</strong></div><div style="margin-bottom:8px"><span class="badge ${BADGE_CLS[s.status]||'created'}">${esc(LABEL[s.status]||s.status)}</span> <span style="color:var(--text3);font-size:.75rem">${s.shipType==='international'?'🌍 Beynəlxalq':'🇦🇿 Daxili'}</span></div>${s.receiverAddress?`<div style="color:var(--text2);font-size:.78rem;margin-bottom:10px"><i class="fas fa-map-marker-alt" style="color:var(--text3)"></i> ${esc(s.receiverAddress)}</div>`:''}${needsManual?`<div style="background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.3);border-radius:10px;padding:12px;margin:10px 0;text-align:center"><div style="color:var(--gold);font-weight:700;margin-bottom:10px"><i class="fas fa-map-marker-alt"></i> Çatdırılma təsdiqini edin</div><button class="btn btn-green" style="width:100%;padding:14px;font-size:.95rem" onclick="markDelivered('${escA(s.id)}')"><i class="fas fa-check-circle"></i> Çatdırıldı — Təsdiqlə</button></div>`:'<div style="color:var(--text2);padding:8px 0;font-size:.82rem">📌 Bu mərhələdə sizin rolunuz status dəyişə bilməz</div>'}<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px"><button class="btn btn-ghost btn-sm" onclick="viewDetail('${escA(s.id)}');closeScanner()"><i class="fas fa-eye"></i> Detallar</button><button class="btn btn-sm" style="background:#25D366;color:#fff" onclick="sendWA('${escA(s.receiverPhone||'')}','${escA(s.id)}','${escA(s.status)}','${escA((s.receiverName||'')+' '+(s.receiverSurname||''))}')"><i class="fab fa-whatsapp"></i></button><button class="btn btn-ghost btn-sm" onclick="closeScanner()">Bağla</button></div></div>`;
  }
}

window.rollbackStatus=async(id,prev)=>{

window.togglePassword=()=>{
  const pwd=document.getElementById('loginPass');const ico=document.querySelector('.toggle-pwd i');
  if(!pwd)return;
  if(pwd.type==='password'){pwd.type='text';if(ico)ico.className='fas fa-eye-slash';}
  else{pwd.type='password';if(ico)ico.className='fas fa-eye';}
};
window.doLogin=()=>{
  const u=document.getElementById('loginUser')?.value.trim();
  const p=document.getElementById('loginPass')?.value;
  if(!u||!p){toast('İstifadəçi adı və şifrə daxil edin',true);return;}
  const list=employees.length>0?employees:DEFAULT_EMPLOYEES;
  const user=list.find(e=>e.username===u&&e.password===p&&e.active!==0);
  if(!user){toast('İstifadəçi adı və ya şifrə yanlışdır',true);return;}
  currentUser=user;currentRole=user.role;
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('userAvatar').textContent=(user.name||'?')[0].toUpperCase();
  document.getElementById('userName').textContent=(user.name||'')+' '+(user.surname||'');
  document.getElementById('userRole').textContent=ROLES[currentRole]||'';
  buildSidebar();changePage('dashboard');
  toast(`Xoş gəldiniz, ${user.name}! 👋`);
};
window.doLogout=()=>{
  if(!confirm('Sistemdən çıxmaq istəyirsiniz?'))return;
  if(unsubShip){unsubShip();unsubShip=null;}
  if(unsubEmp){unsubEmp();unsubEmp=null;}
  document.getElementById('app').style.display='none';
  currentUser=null;currentRole='';currentPage='dashboard';
  document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';
  document.getElementById('loginWrap').style.display='flex';
  setTimeout(()=>document.getElementById('loginUser')?.focus(),100);
};

      const snap=await getDoc(doc(db,'shipments',trackId));
      if(!snap.exists()){
        document.getElementById('appRoot').innerHTML=`<div class="track-page"><div class="track-card" style="text-align:center"><i class="fas fa-box-open" style="font-size:3rem;color:var(--red);margin-bottom:15px;display:block"></i><h3 style="color:#fff;margin-bottom:10px">Bağlama tapılmadı</h3><p style="color:var(--text3)">"${esc(trackId)}" ID-li bağlama sistemdə mövcud deyil</p></div></div>`;
        document.getElementById('loadingScreen')?.remove();
        return;
      }
      const s=snap.data();const seq=s.shipType==='domestic'?DOMESTIC:INTERNATIONAL;
      const idx=seq.indexOf(s.status);
      document.getElementById('appRoot').innerHTML=`<div class="track-page"><div class="track-card"><div class="track-head"><div class="logo">📦</div><h1>GoldExpress</h1><p style="color:var(--text3);font-size:.7rem">Bağlama İzləmə Sistemi</p></div><div class="track-id-block"><div class="lbl">Bağlama ID</div><div class="val">${esc(s.id)}</div></div><div class="track-status-badge"><span class="badge ${BADGE_CLS[s.status]}">${esc(LABEL[s.status])}</span></div><div class="track-steps">${seq.map((st,i)=>`<div class="step-row"><div class="step-dot ${i<idx?'done':i===idx?'curr':'pend'}"><i class="fas ${i<idx?'fa-check':i===idx?'fa-box':'fa-circle'}"></i></div><div class="step-info"><div class="title">${esc(LABEL[st])}</div>${i===idx?`<div class="date">✓ Hazırda bu mərhələdə</div>`:''}</div></div>${i<seq.length-1?`<div class="step-line ${i<idx?'done':''}"></div>`:''}`).join('')}</div><div class="track-info"><div class="info-row"><span class="lbl">Göndərən</span><span class="val">${esc((s.senderName||'')+' '+(s.senderSurname||''))}</span></div><div class="info-row"><span class="lbl">Alan</span><span class="val">${esc((s.receiverName||'')+' '+(s.receiverSurname||''))}</span></div><div class="info-row"><span class="lbl">Çatdırılma ünvanı</span><span class="val">${esc(s.receiverAddress||'—')}</span></div><div class="info-row"><span class="lbl">Çəki</span><span class="val">${esc(s.weight||0)} kg</span></div><div class="info-row"><span class="lbl">Daşınma</span><span class="val">${s.shipType==='international'?'🌍 Beynəlxalq':'🇦🇿 Daxili'}</span></div>${s.trackingCode?`<div class="info-row"><span class="lbl">İzləmə kodu</span><span class="val">${esc(s.trackingCode)}</span></div>`:''}</div><div class="track-foot">GoldExpress Kargo İdarəetmə Sistemi<br>Son yeniləmə: ${esc((s.createdAt||'').slice(0,16))}</div></div></div>`;
      document.getElementById('loadingScreen')?.remove();
    }catch(e){
      document.getElementById('loadingScreen').innerHTML='<div style="color:var(--red);text-align:center;padding:40px">❌ Məlumat bazası xətası</div>';
    }
  })();
}else{
  document.getElementById('appRoot').innerHTML=`<div id="loginWrap" class="login-wrap" style="display:flex"><div class="login-card"><div class="logo">📦</div><h1>GoldExpress</h1><p class="sub">Kargo İdarəetmə Sistemi v12</p><div class="inp-wrap"><i class="fas fa-user icon"></i><input type="text" id="loginUser" placeholder="İstifadəçi adı" autofocus onkeydown="if(event.key==='Enter')doLogin()"></div><div class="inp-wrap"><i class="fas fa-lock icon"></i><input type="password" id="loginPass" placeholder="Şifrə" onkeydown="if(event.key==='Enter')doLogin()"><button type="button" class="toggle-pwd" onclick="togglePassword()"><i class="fas fa-eye"></i></button></div><button class="login-btn" onclick="doLogin()"><i class="fas fa-sign-in-alt"></i> Sistemə Giriş</button><div class="login-hint">📋 Test girişləri:<br>🔑 admin / admin123 &nbsp;|&nbsp; 👤 operator / oper123<br>🏭 warehouse / anbar123 &nbsp;|&nbsp; 🛵 courier / kuryer123</div></div></div><div id="app" class="app"><div class="sidebar"><div class="sb-head"><span class="ico">📦</span><div><h3>GoldExpress</h3><span>v12</span></div></div><nav class="sb-nav" id="sidebarNav"></nav><div class="sb-sec">Sürətli əməliyyat</div><div class="sb-user"><button class="btn-scan" onclick="openScanner()"><i class="fas fa-qrcode"></i><span>QR Skan Et</span></button><div class="sb-user-row"><div class="sb-avatar" id="userAvatar">A</div><div class="sb-user-info"><h4 id="userName">Admin</h4><span id="userRole">Administrator</span></div></div><button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i><span>Çıxış</span></button></div></div><div class="main-area"><div id="mainContent"></div></div></div>`;

  unsubShip=onSnapshot(query(collection(db,'shipments'),orderBy('createdAt','desc')),snap=>{
    shipments=snap.docs.map(d=>({...d.data()}));
    if(currentUser&&['dashboard','shipments','warehouse','courier','report','finance','customers'].includes(currentPage)){renderPage(currentPage);}
    syncShow();
  });
  unsubEmp=onSnapshot(collection(db,'employees'),snap=>{
    if(snap.empty){
      DEFAULT_EMPLOYEES.forEach(e=>setDoc(doc(db,'employees',e.id),e));
      employees=DEFAULT_EMPLOYEES;
    }else{employees=snap.docs.map(d=>({...d.data()}));}
    if(currentPage==='employees'&&currentUser)renderPage('employees');
  });
  setTimeout(()=>{const ls=document.getElementById('loadingScreen');if(ls){ls.style.opacity='0';setTimeout(()=>ls.remove(),400);}},600);
}

document.addEventListener('click',e=>{
  if(e.target.classList.contains('overlay')&&e.target.classList.contains('open')){
    if(e.target.id==='modalScan')window.closeScanner();
    else e.target.classList.remove('open');
  }
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    const open=document.querySelector('.overlay.open');
    if(open){
      if(open.id==='modalScan')window.closeScanner();
      else open.classList.remove('open');
    }
  }
});
</script>
</body>
</html>
